<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Received · Bayview Makers District</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Mono',monospace; background:#181614; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
    .card { max-width:480px; }
    .mark { font-family:'Bebas Neue',sans-serif; font-size:3rem; color:#F2EDE3; letter-spacing:0.05em; margin-bottom:2rem; }
    .mark span { color:#C4522A; }
    .icon { font-size:2.5rem; margin-bottom:1.5rem; }
    h1 { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:#F2EDE3; margin-bottom:1rem; letter-spacing:0.03em; }
    p { color:rgba(242,237,227,0.45); font-size:0.82rem; line-height:1.85; margin-bottom:2rem; }
    a { display:inline-block; background:#C4522A; color:#fff; text-decoration:none; padding:0.8rem 2rem; font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; font-weight:500; transition:background 0.25s; }
    a:hover { background:#D4673F; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">BM<span>D</span></div>
    <div class="icon">&#10003;</div>
    <h1>Pitch Received</h1>
    <p>Thank you for reaching out to the Bayview Makers District. We review every pitch and will be in touch shortly.</p>
    <a href="/">&#8592; Back to BMD</a>
  </div>
</body>
</html>
